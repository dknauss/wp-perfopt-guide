name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name || github.ref }}
      cancel-in-progress: false
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup docs toolchain
        uses: dknauss/ai-assisted-docs/.github/actions/setup-docs-toolchain@daefe86423522f8ce7c42947c5d1c91f7f48b126
        timeout-minutes: 15

      - name: Validate manifest metadata
        run: python3 .github/scripts/validate-release-metadata.py --manifest .github/documents.json --expected-tag "$RELEASE_TAG"

      - name: Generate documents
        run: bash .github/scripts/generate-docs.sh

      - name: Validate generated artifacts
        run: python3 .github/scripts/validate-artifacts.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          make_latest: true
          files: |
            *.pdf
            *.docx
            *.epub
