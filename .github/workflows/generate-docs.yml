name: Generate PDF, Word & EPUB Documents

on:
  push:
    branches: [main]
    paths:
      - 'DEVELOPER_REFERENCE.md'
      - 'wordpress-performance-optimization-checklist.md'
      - 'enterprise-performance-operational-checklist.md'
      - 'REFERENCE-WP-Transients-Persistent-Object-Cache.md'
      - 'wordpress-performance-incident-runbook.md'
      - '.github/documents.json'
      - '.github/scripts/generate-docs.sh'
      - '.github/scripts/validate-artifacts.py'
      - '.github/workflows/generate-docs.yml'
      - '.github/pandoc/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-docs-${{ github.repository }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Pandoc
        run: |
          PANDOC_VER=3.6.3
          wget -q "https://github.com/jgm/pandoc/releases/download/${PANDOC_VER}/pandoc-${PANDOC_VER}-1-amd64.deb"
          sudo dpkg -i "pandoc-${PANDOC_VER}-1-amd64.deb"
          rm "pandoc-${PANDOC_VER}-1-amd64.deb"

      - name: Install LaTeX, fonts, and validators
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            lmodern \
            fonts-noto-core \
            fonts-noto-extra \
            epubcheck \
            poppler-utils \
            unzip

      - name: Install eisvogel template
        run: |
          mkdir -p ~/.pandoc/templates
          TMPDIR_EIS=$(mktemp -d)
          curl -sL "https://github.com/Wandmalfarbe/pandoc-latex-template/releases/latest/download/Eisvogel.tar.gz" \
            | tar -xz -C "$TMPDIR_EIS"
          find "$TMPDIR_EIS" -name "*.latex" -exec cp {} ~/.pandoc/templates/ \;
          rm -rf "$TMPDIR_EIS"

      - name: Generate documents
        run: bash .github/scripts/generate-docs.sh

      - name: Validate generated artifacts
        run: python3 .github/scripts/validate-artifacts.py

      - name: Upload generated document bundle
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: generated-docs-bundle
          path: |
            *.pdf
            *.docx
            *.epub
            .github/documents.json
            .github/pandoc/reference.docx
            .github/pandoc/pdf-defaults.yaml
            .github/pandoc/epub.css

      - name: Commit generated documents
        if: github.ref == 'refs/heads/main'
        run: |
          branch="${GITHUB_REF_NAME:-main}"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add *.pdf *.docx *.epub .github/pandoc/reference.docx .github/pandoc/pdf-defaults.yaml .github/pandoc/epub.css 2>/dev/null || true

          if ! git diff --staged --quiet; then
            git commit -m "docs: regenerate PDF, Word, and EPUB documents [skip ci]"
            git pull --rebase origin "$branch"
            git push
          else
            echo "No changes to commit"
          fi
